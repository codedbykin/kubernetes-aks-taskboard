spec:
  template:
    spec:
      containers:
        - name: frontend
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: html-volume
          configMap:
            name: frontend-html
        - name: nginx-conf
          configMap:
            name: nginx-config